        <h1>İletişim</h1>
        <div class="contact-section">
            <form id="contactForm">
              <label for="name">İsim</label>
              <input type="text" id="name" name="name" placeholder="Adınız" required>
          
              <label for="email">E-mail</label>
              <input type="email" id="email" name="email" placeholder="Email adresiniz" required>
          
              <label for="message">Mesaj</label>
              <textarea id="message" name="message" placeholder="Mesajınızı yazın" required></textarea>
          
              <button type="submit">Gönder</button>
            </form>
          </div>
        <div class="social-media">
            <h2></h2>
            <div class="social-links">
                <a href="https://linkedin.com/yourprofile" target="_blank">LinkedIn</a>
