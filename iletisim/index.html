<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emir Aydın | İletişim</title>
    <link rel="stylesheet" href="/anasayfa/styles.css">
    <link rel="stylesheet" href="styles-iletisim.css">
    <link rel="icon" href="icons/favicon_io/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="icons/favicon_io/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div id="header"></div>
    </header>
    <div class="container">
        <h1>İletişim</h1>
        <div class="contact-section">
            <form id="contactForm1">
              <label for="name">İsim</label>
              <input type="text" id="name" name="name" placeholder="Adınız" required>
          
              <label for="email">E-mail</label>
              <input type="email" id="email" name="email" placeholder="Email adresiniz" required>
          
              <label for="message">Mesaj</label>
              <textarea id="message" name="message" placeholder="Mesajınızı yazın" required></textarea>
          
              <button type="submit">Gönder</button>
            </form>
          </div>
        <div class="social-media">
            <h2></h2>
            <footer class="social-footer">
                <a href="https://www.linkedin.com/in/ibrahimemiraydin" target="_blank" class="social-link"><i class="fab fa-linkedin"></i></a>
                <a href="https://github.com/ibrahimemiraydin" target="_blank" class="social-link"><i class="fab fa-github"></i></a>
                <a href="https://www.instagram.com/emiraydin.16" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="https://twitter.com/emiraydin1625" target="_blank" class="social-link"><i class="fab fa-twitter"></i></a>
              </footer>
        </div>
    </div>
    <footer>
        <div id="footer"></div>
    </footer>


    <script src="/anasayfa/script.js"></script>
</body>
</html>
